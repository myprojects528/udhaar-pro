<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UdhaarPro v10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 75px; box-shadow: 0 -5px 25px rgba(0,0,0,0.05); display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding: 0 10px; }
        .plus-container { position: absolute; left: 50%; bottom: 25px; transform: translateX(-50%); z-index: 1001; display: flex; justify-content: center; align-items: center; }
        .raised-btn { background: linear-gradient(135deg, #10b981 0%, #064e3b 100%); width: 68px; height: 68px; border-radius: 50%; display: flex !important; align-items: center !important; justify-content: center !important; color: white; border: 6px solid #f8fafc; box-shadow: 0 10px 20px rgba(6,78,59,0.3); padding: 0; margin: 0; cursor: pointer; }
        @media (min-width: 768px) { .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; background: #064e3b; color: white; display: flex; flex-direction: column; z-index: 100; } .main-content { margin-left: 280px; padding: 30px; } .mobile-nav { display: none; } #search-inner-container { max-width: 800px; margin: 0 auto; } }
        @media (max-width: 767px) { .sidebar { display: none; } .main-content { padding: 15px; margin-bottom: 100px; } .mobile-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; } }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #search-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; display: none; }
        @media print { body * { visibility: hidden; } #receipt-printable, #receipt-printable * { visibility: visible; } #receipt-printable { position: absolute; left: 0; top: 0; width: 100%; } .no-print { display: none; } }
    </style>
</head>
<body>

    <div id="search-popup" class="p-6">
        <div id="search-inner-container">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="toggleSearch()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="arrow-left"></i></button>
                <input type="text" id="search-input" onkeyup="filterSearch()" placeholder="Search customer..." class="flex-1 p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-lg ring-2 ring-slate-100">
            </div>
            <div id="search-results" class="space-y-3"></div>
        </div>
    </div>

    <aside class="sidebar p-8 shadow-xl">
        <h1 class="text-2xl font-black mb-12 flex items-center gap-3"><i data-lucide="shield-check"></i> UdhaarPro</h1>
        <nav class="space-y-2">
            <button onclick="showTab('dashboard')" class="w-full flex items-center gap-4 p-4 rounded-xl font-bold hover:bg-white/10" id="side-dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</button>
            <button onclick="showTab('customers')" class="w-full flex items-center gap-4 p-4 rounded-xl font-bold hover:bg-white/10" id="side-customers"><i data-lucide="users"></i> Customers</button>
            <button onclick="showTab('transactions')" class="w-full flex items-center gap-4 p-4 rounded-xl font-bold hover:bg-white/10" id="side-transactions"><i data-lucide="history"></i> Records</button>
            <button onclick="showTab('settings')" class="w-full flex items-center gap-4 p-4 rounded-xl font-bold hover:bg-white/10" id="side-settings"><i data-lucide="settings"></i> Settings</button>
        </nav>
    </aside>

    <div class="main-content">
        <header class="bg-[#064e3b] text-white p-5 mb-8 flex justify-between items-center rounded-2xl shadow-lg">
            <div class="flex items-center gap-3">
                <div id="back-btn" onclick="showTab('customers')" class="hidden bg-white/20 p-2 rounded-full cursor-pointer"><i data-lucide="arrow-left" class="w-5 h-5"></i></div>
                <h1 id="app-title" class="text-lg font-black uppercase">UdhaarPro</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleSearch()" class="p-2 bg-white/20 rounded-full"><i data-lucide="search" class="w-5 h-5"></i></button>
                <button onclick="refreshData()" class="p-2 bg-white/20 rounded-full"><i id="refresh-icon" data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            </div>
        </header>

        <section id="dashboard" class="tab-content active space-y-8">
            <div class="mobile-grid-2 md:grid md:grid-cols-4 md:gap-6">
                <div class="bg-indigo-600 p-8 rounded-xl text-white shadow-lg"><p class="text-[10px] font-bold opacity-70 uppercase mb-1">Total Given</p><h3 id="stat-given" class="text-lg font-black">PKR 0</h3></div>
                <div class="bg-rose-500 p-8 rounded-xl text-white shadow-lg"><p class="text-[10px] font-bold opacity-70 uppercase mb-1">Remaining</p><h3 id="stat-udhaar" class="text-lg font-black">PKR 0</h3></div>
                <div class="bg-emerald-600 p-8 rounded-xl text-white shadow-lg"><p class="text-[10px] font-bold opacity-70 uppercase mb-1">Collected</p><h3 id="stat-recovered" class="text-lg font-black">PKR 0</h3></div>
                <div class="bg-amber-500 p-8 rounded-xl text-white shadow-lg"><p class="text-[10px] font-bold opacity-70 uppercase mb-1">Clients</p><h3 id="stat-customers" class="text-lg font-black">0</h3></div>
            </div>
            <div class="flex gap-4">
                <button onclick="openEntryModal('existing')" class="flex-1 bg-slate-900 text-white py-5 rounded-3xl font-black flex items-center justify-center gap-2 shadow-xl"><i data-lucide="plus-circle"></i> Add Record</button>
                <button onclick="openEntryModal('new')" class="flex-1 bg-white text-slate-900 border border-slate-200 py-5 rounded-3xl font-black flex items-center justify-center gap-2 shadow-sm"><i data-lucide="user-plus"></i> New Customer</button>
            </div>
            <div class="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
                <div class="p-6 border-b font-black text-slate-800">Recent Transactions</div>
                <div id="recent-txns" class="divide-y divide-slate-50"></div>
            </div>
        </section>

        <section id="customers" class="tab-content space-y-4"><div id="customer-list-ui" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></section>
        <section id="customer-profile" class="tab-content space-y-6"><div id="profile-detail-view"></div></section>
        <section id="transactions" class="tab-content space-y-4"><div id="full-txn-list" class="space-y-3"></div></section>
        <section id="settings" class="tab-content space-y-6">
            <div class="bg-white p-8 rounded-[2rem] border shadow-sm max-w-xl mx-auto text-center">
                <h3 class="text-xl font-bold mb-6">Statement Download</h3>
                <input type="text" id="statement-search" onfocus="filterStatementList()" onkeyup="filterStatementList()" placeholder="Search customer..." class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none">
                <div id="statement-dropdown" class="hidden border rounded-xl max-h-40 overflow-y-auto bg-white shadow-md mt-1"></div>
                <div id="date-range-box" class="hidden space-y-4 mt-4 bg-emerald-50 p-4 rounded-xl">
                   <div id="selected-cust-name" class="font-bold text-emerald-800"></div>
                   <div class="grid grid-cols-2 gap-2">
                       <input type="date" id="start-date" class="p-2 border rounded">
                       <input type="date" id="end-date" class="p-2 border rounded">
                   </div>
                   <div class="grid grid-cols-2 gap-2">
                       <button onclick="downloadCSV()" class="bg-slate-800 text-white p-3 rounded-lg text-sm">CSV</button>
                       <button onclick="generatePDF()" class="bg-emerald-600 text-white p-3 rounded-lg text-sm">PDF</button>
                   </div>
                </div>
            </div>
        </section>
    </div>

    <nav class="mobile-nav">
        <button onclick="showTab('dashboard')"><i data-lucide="layout-grid"></i></button>
        <button onclick="showTab('customers')" class="mr-14"><i data-lucide="users"></i></button>
        <div class="plus-container"><button onclick="openChoiceModal()" class="raised-btn"><i data-lucide="plus"></i></button></div>
        <button onclick="showTab('transactions')" class="ml-14"><i data-lucide="history"></i></button>
        <button onclick="showTab('settings')"><i data-lucide="settings"></i></button>
    </nav>

    <div id="receipt-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[5000] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
            <div id="receipt-printable" class="p-8 bg-white text-sm">
                <div class="text-center mb-6 border-b pb-4"><h2 class="text-2xl font-black text-[#064e3b]">UdhaarPro</h2><p class="text-[10px] text-slate-400 uppercase tracking-widest">Transaction Receipt</p></div>
                <div class="space-y-4">
                    <div class="flex justify-between"><span class="text-slate-400">Date:</span><span id="r-date" class="font-bold"></span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Customer:</span><span id="r-name" class="font-bold"></span></div>
                    <div class="flex justify-between border-t pt-4"><span class="text-slate-400">Type:</span><span id="r-type" class="font-bold uppercase"></span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Amount:</span><span id="r-amount" class="font-black text-lg"></span></div>
                    <div id="r-desc-container" class="flex flex-col border-t pt-4"><span class="text-slate-400">Description:</span><span id="r-desc" class="italic font-bold"></span></div>
                    <div class="flex justify-between border-t pt-4 bg-slate-50 p-2 rounded-lg font-black text-rose-600"><span>Final Bal:</span><span id="r-balance"></span></div>
                </div>
            </div>
            <div class="p-4 bg-slate-50 flex gap-2 no-print">
                <button onclick="downloadReceiptPDF()" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2"><i data-lucide="download" class="w-4 h-4"></i> Save</button>
                <button onclick="window.print()" class="bg-slate-900 text-white px-4 py-3 rounded-xl font-bold"><i data-lucide="printer" class="w-4 h-4"></i></button>
                <button onclick="closeReceipt()" class="bg-slate-200 text-slate-600 px-4 py-3 rounded-xl font-bold">Close</button>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/60 z-[3000] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl">
            <form id="txnForm" class="space-y-4">
                <div id="name-input-container"><select id="m-name-select" onchange="calculateRealTime()" class="w-full bg-slate-100 p-4 rounded-xl font-bold"></select></div>
                <div id="new-name-container" class="hidden space-y-2">
                    <input type="text" id="m-name-text" placeholder="Full Name" class="w-full bg-slate-100 p-4 rounded-xl border">
                    <input type="text" id="m-father-name" placeholder="Father Name" class="w-full bg-slate-100 p-4 rounded-xl border">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button type="button" onclick="setType('Udhaar')" id="btn-udhaar" class="p-4 rounded-xl border-2 border-rose-500 bg-rose-50 text-rose-700 font-bold">Udhaar (+)</button>
                    <button type="button" onclick="setType('Paid')" id="btn-paid" class="p-4 rounded-xl border-2 border-slate-100 font-black text-slate-400">Paid (-)</button>
                </div>
                <input type="hidden" id="m-type" value="Udhaar">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="m-amount" onkeyup="calculateRealTime()" required placeholder="0" class="w-full bg-slate-100 p-4 rounded-xl font-black text-xl">
                    <div class="bg-slate-900 rounded-xl p-4 text-center text-white"><p class="text-[8px] text-emerald-400">Estimated Bal</p><p id="calc-preview" class="text-xs font-black">0</p></div>
                </div>
                <input type="text" id="m-desc" placeholder="Details (Note)" class="w-full bg-slate-100 p-4 rounded-xl">
                <button type="submit" id="saveBtn" class="w-full bg-[#064e3b] text-white py-5 rounded-2xl font-black shadow-lg">Confirm & Save</button>
            </form>
            <button onclick="closeModal()" class="w-full mt-4 text-slate-400 font-bold text-sm">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyANM3X8DyEji1hUqOOHV7SIBaEXxnvgW7k",
            authDomain: "udhaarpro.firebaseapp.com",
            projectId: "udhaarpro",
            storageBucket: "udhaarpro.firebasestorage.app",
            messagingSenderId: "230308698204",
            appId: "1:230308698204:web:cb0776e94414b74f2b2e99",
            measurementId: "G-N7PFENLW7S",
            databaseURL: "https://udhaarpro-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let appData = { customers: [], allTransactions: [], summary: {} };
        let currentMode = 'existing', selectedStatementCust = null;

        // --- FETCH & RENDER ---
        function refreshData() {
            const icon = document.getElementById('refresh-icon');
            if(icon) icon.classList.add('spin');
            db.ref('transactions').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                processData(data);
                if(icon) icon.classList.remove('spin');
            });
        }

        function processData(rawTxns) {
            let customers = {}, allTxns = [], totalRecovered = 0, totalGivenEver = 0;
            Object.keys(rawTxns).forEach(key => {
                let t = rawTxns[key];
                if (!customers[t.name]) customers[t.name] = { name: t.name, fatherName: t.fatherName, totalUdhaar: 0, totalPaid: 0, balance: 0, history: [] };
                let val = Number(t.amount) || 0;
                if (t.type === 'Udhaar') { customers[t.name].totalUdhaar += val; customers[t.name].balance += val; totalGivenEver += val; } 
                else { customers[t.name].totalPaid += val; customers[t.name].balance -= val; totalRecovered += val; }
                const txnObj = { ...t, id: key };
                allTxns.push(txnObj); customers[t.name].history.push(txnObj);
            });
            const cList = Object.values(customers).sort((a,b) => a.name.localeCompare(b.name));
            appData = { customers: cList, allTransactions: [...allTxns].reverse(), recentTransactions: allTxns.slice(-10).reverse(),
                        summary: { totalGivenEver, marketBalance: cList.reduce((a,b)=>a+(b.balance>0?b.balance:0),0), totalRecovered, totalCustomers: cList.length } };
            renderUI(appData);
        }

        function renderUI(data) {
            document.getElementById('stat-given').innerText = `PKR ${data.summary.totalGivenEver.toLocaleString()}`;
            document.getElementById('stat-udhaar').innerText = `PKR ${data.summary.marketBalance.toLocaleString()}`;
            document.getElementById('stat-recovered').innerText = `PKR ${data.summary.totalRecovered.toLocaleString()}`;
            document.getElementById('stat-customers').innerText = data.summary.totalCustomers;
            
            document.getElementById('recent-txns').innerHTML = data.recentTransactions.map(t => `
                <div onclick="openReceipt('${t.id}')" class="p-5 flex justify-between items-center text-sm font-bold cursor-pointer hover:bg-slate-50">
                    <div class="flex items-center gap-3">
                        <div class="p-2 rounded-full ${t.type==='Udhaar'?'bg-rose-50 text-rose-500':'bg-emerald-50 text-emerald-500'}"><i data-lucide="${t.type==='Udhaar'?'arrow-up-right':'arrow-down-left'}" class="w-4 h-4"></i></div>
                        <div><p>${t.name}</p><p class="text-[9px] text-slate-400 uppercase">${t.date}</p></div>
                    </div>
                    <p class="${t.type === 'Udhaar' ? 'text-rose-500' : 'text-emerald-600'}">PKR ${Number(t.amount).toLocaleString()}</p>
                </div>`).join('');

            document.getElementById('customer-list-ui').innerHTML = data.customers.map(c => `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm flex justify-between items-center border-l-8 ${c.balance > 0 ? 'border-l-rose-500' : 'border-l-emerald-500'}">
                    <div onclick="viewCustomer('${c.name}')" class="flex-1 cursor-pointer">
                        <h4 class="font-black text-slate-800 text-lg">${c.name}</h4>
                        <p class="text-xl font-black ${c.balance > 0 ? 'text-rose-500' : 'text-emerald-600'}">PKR ${c.balance.toLocaleString()}</p>
                    </div>
                </div>`).join('');
            
            document.getElementById('m-name-select').innerHTML = data.customers.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            lucide.createIcons();
        }

        // --- NEW: DOWNLOAD RECEIPT PDF ---
        function downloadReceiptPDF() {
            const date = document.getElementById('r-date').innerText;
            const name = document.getElementById('r-name').innerText;
            const type = document.getElementById('r-type').innerText;
            const amount = document.getElementById('r-amount').innerText;
            const balance = document.getElementById('r-balance').innerText;
            const desc = document.getElementById('r-desc').innerText;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: [80, 150] }); // Chhota receipt format

            doc.setFontSize(18); doc.setTextColor(6, 78, 59); doc.text("UdhaarPro", 40, 15, { align: 'center' });
            doc.setFontSize(8); doc.setTextColor(150); doc.text("TRANSACTION RECEIPT", 40, 20, { align: 'center' });
            
            doc.setDrawColor(200); doc.line(10, 25, 70, 25);
            
            doc.setFontSize(10); doc.setTextColor(50);
            doc.text(`Date:`, 10, 35); doc.text(date, 70, 35, { align: 'right' });
            doc.text(`Customer:`, 10, 45); doc.text(name, 70, 45, { align: 'right' });
            
            doc.setDrawColor(240); doc.line(10, 50, 70, 50);
            
            doc.text(`Type:`, 10, 60); doc.text(type, 70, 60, { align: 'right' });
            doc.setFontSize(12); doc.text(`Amount:`, 10, 70); doc.text(amount, 70, 70, { align: 'right' });
            
            doc.setFontSize(9); doc.text(`Note:`, 10, 80); doc.text(desc, 70, 80, { align: 'right' });
            
            doc.setFillColor(248, 250, 252); doc.rect(5, 90, 70, 15, 'F');
            doc.setFontSize(11); doc.setTextColor(225, 29, 72); // Rose color
            doc.text(`Remaining Balance:`, 10, 100); doc.text(balance, 70, 100, { align: 'right' });
            
            doc.setFontSize(7); doc.setTextColor(180); doc.text("Thank you for using UdhaarPro", 40, 130, { align: 'center' });
            
            doc.save(`Receipt_${name}_${date}.pdf`);
        }

        // --- BAKI FUNCTIONS (Original Logic) ---
        function openReceipt(txnId) {
            const t = appData.allTransactions.find(x => x.id == txnId);
            if(!t) return;
            const c = appData.customers.find(x => x.name === t.name);
            document.getElementById('r-date').innerText = t.date;
            document.getElementById('r-name').innerText = t.name;
            document.getElementById('r-type').innerText = t.type;
            document.getElementById('r-amount').innerText = "PKR " + Number(t.amount).toLocaleString();
            document.getElementById('r-balance').innerText = "PKR " + (c ? c.balance.toLocaleString() : '0');
            document.getElementById('r-desc').innerText = t.description || '-';
            document.getElementById('receipt-modal').classList.remove('hidden');
        }

        function calculateRealTime() {
            let bal = 0; let name = (currentMode === 'fixed') ? window.tempFixedName : (currentMode === 'existing' ? document.getElementById('m-name-select').value : "");
            const c = appData.customers.find(x => x.name === name); if(c) bal = c.balance;
            const amt = Number(document.getElementById('m-amount').value) || 0;
            const res = (document.getElementById('m-type').value === 'Udhaar') ? (bal + amt) : (bal - amt);
            document.getElementById('calc-preview').innerText = "PKR " + res.toLocaleString();
        }

        function setType(t) { document.getElementById('m-type').value = t; calculateRealTime(); }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); lucide.createIcons(); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function closeReceipt() { document.getElementById('receipt-modal').classList.add('hidden'); }
        function openChoiceModal() { document.getElementById('choice-modal').classList.remove('hidden'); }
        function closeChoiceModal() { document.getElementById('choice-modal').classList.add('hidden'); }
        function handleChoice(m) { closeChoiceModal(); openEntryModal(m); }
        function openEntryModal(mode, name=null) { currentMode = mode; document.getElementById('modal').classList.remove('hidden'); document.getElementById('new-name-container').classList.toggle('hidden', mode!=='new'); document.getElementById('name-input-container').classList.toggle('hidden', mode==='new'); if(name) window.tempFixedName = name; calculateRealTime(); }
        
        document.getElementById('txnForm').onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn'); btn.disabled = true;
            let n = (currentMode === 'new') ? document.getElementById('m-name-text').value : (currentMode==='fixed'?window.tempFixedName:document.getElementById('m-name-select').value);
            const data = { name: n, fatherName: document.getElementById('m-father-name').value, amount: document.getElementById('m-amount').value, type: document.getElementById('m-type').value, description: document.getElementById('m-desc').value, date: new Date().toLocaleDateString('en-GB'), timestamp: Date.now() };
            db.ref('transactions').push(data).then(() => { closeModal(); e.target.reset(); btn.disabled = false; });
        };

        window.onload = () => { refreshData(); lucide.createIcons(); };
    </script>
</body>
</html>
